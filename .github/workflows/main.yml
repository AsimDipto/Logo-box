name: Unzip BD Logos and Push

on:
  push:
    paths:
      - 'logo.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Unzip Script
        run: python unzip_logos_bd.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Bangladesh/
          git commit -m "Automated: Extracted logos to Bangladesh folder" || echo "No changes to commit"
          git push
